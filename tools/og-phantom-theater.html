<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; align-items:center; justify-content:center; min-height:100vh; }
.og-card {
  width:1200px; height:630px; position:relative; overflow:hidden;
  background-image: linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.85) 70%), url('../images/phantom-theater/IMG_5112-hero@1200.webp');
  background-size: cover;
  background-position: center;
  display:flex; flex-direction:column; justify-content:flex-end;
}
.content { padding: 48px 60px 56px; }
.eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; letter-spacing: 4px; text-transform: uppercase;
  color: #FF6B4A; margin-bottom: 16px; font-weight: 600;
}
.title {
  font-family: 'DM Sans', sans-serif;
  font-size: 64px; font-weight: 800; line-height: 1.05;
  letter-spacing: -1.5px;
  color: #fff;
  text-shadow: 0 4px 20px rgba(0,0,0,0.6);
  max-width: 900px;
  margin-bottom: 18px;
}
.subtitle {
  font-family: 'DM Sans', sans-serif;
  font-size: 22px; font-weight: 500;
  color: rgba(255,255,255,0.92);
  max-width: 800px;
}
.subtitle strong { color: #FF6B4A; font-weight: 700; }
.brand {
  position: absolute; top: 36px; right: 44px;
  display: flex; align-items: center; gap: 10px;
  background: rgba(0,0,0,0.55); padding: 10px 16px;
  border-radius: 999px; border: 1px solid rgba(255,255,255,0.18);
}
.brand-dot { width: 10px; height: 10px; border-radius: 50%; background: linear-gradient(135deg, #FF416C, #FF4B2B); }
.brand-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
  color: #fff; font-weight: 600;
}
</style></head>
<body>
<div class="og-card og-phantom">
  <div class="brand"><div class="brand-dot"></div><div class="brand-name">Ride Ready</div></div>
  <div class="content">
    <div class="eyebrow">Kings Island &middot; New for 2026</div>
    <div class="title">Phantom Theater: Opening Nightmare</div>
    <div class="subtitle">Review &middot; Queue walkthrough &middot; High-score tips &middot; How to skip the <strong>3-hour waits</strong></div>
  </div>
</div>
</body></html>
